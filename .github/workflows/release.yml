name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # create GitHub Release + push gh-pages branch

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      # ── Documentation ──────────────────────────────────────────────────────
      - name: Generate SDK documentation
        run: ./gradlew :eventtracker:dokkaHtml

      - name: Stage versioned and latest docs
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p staging/docs/$VERSION
          mkdir -p staging/docs/latest

          cp -r eventtracker/build/docs/html/. staging/docs/$VERSION/
          cp -r eventtracker/build/docs/html/. staging/docs/latest/

          # Root index redirects to latest docs
          cat > staging/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=docs/latest/">
            <title>EventTracker SDK — Documentation</title>
          </head>
          <body>
            <p>Redirecting to <a href="docs/latest/">latest documentation</a>…</p>
          </body>
          </html>
          EOF

      - name: Deploy documentation to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: staging
          # clean: false preserves previously deployed version folders
          clean: false

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Documentation
            - Version-specific: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/docs/${{ github.ref_name }}/
            - Latest: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/docs/latest/

            ## JitPack
            ```kotlin
            // settings.gradle.kts
            dependencyResolutionManagement {
                repositories { maven("https://jitpack.io") }
            }

            // build.gradle.kts
            implementation("com.github.${{ github.repository_owner }}.${{ github.event.repository.name }}:eventtracker:${{ github.ref_name }}")
            implementation("com.github.${{ github.repository_owner }}.${{ github.event.repository.name }}:eventtracker-adapter-firebase:${{ github.ref_name }}")
            ```
